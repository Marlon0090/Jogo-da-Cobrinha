<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Neon Game</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle,#252525,#050505);

    font-family:'Segoe UI',Arial,sans-serif;

    color:white;

}



.container{

    display:flex;

    flex-direction:column;

    align-items:center;

}



h1{

    font-size:42px;

    margin-bottom:20px;

    color:#00ff88;

    text-shadow:
    0 0 10px #00ff88,
    0 0 30px #00ff88;

}



.info{

    display:flex;

    gap:20px;

    margin-bottom:20px;

}



.card{

    background:#151515;

    padding:12px 30px;

    border-radius:15px;

    font-size:20px;

    border:1px solid #333;

}



canvas{

    width:400px;

    height:400px;

    background:#111;

    border:3px solid #00ff88;

    border-radius:15px;

    box-shadow:

    0 0 25px #00ff88,

    inset 0 0 30px #000;

}



#message{

    margin-top:20px;

    color:#ccc;

    font-size:18px;

}



button{

    margin-top:15px;

    padding:12px 35px;

    border:none;

    border-radius:30px;

    cursor:pointer;

    font-size:18px;

    font-weight:bold;

    background:#00ff88;

    color:#111;

}



button:hover{

    transform:scale(1.05);

}



@media(max-width:500px){

canvas{

width:90vw;

height:90vw;

}

h1{

font-size:30px;

}

}

ols{
    display:none;
    margin-top:20px;
    user-select:none;
}

.controls{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:25px auto 10px;
    width:100%;
}

.controls .row{
    display:flex;
    justify-content:center;
    gap:18px;
}

.btn-control{
    width:68px;
    height:68px;
    border-radius:50%;
    border:none;
    background:#00ff88;
    color:#111;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 0 18px #00ff88;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
    padding:0;
}

.btn-control:active{
    transform:scale(.92);
}

@media(max-width:700px){

    .controls{
        display:flex;
    }

}

@media(max-width:700px){

    .controls{
        display:flex;
        flex-direction:column;
        align-items:center;
    }

}


</style>

</head>


<body>


<div class="container">


<h1>🐍 Snake Neon</h1>


<div class="info">


<div class="card">

🏆 Pontos:

<span id="score">0</span>

</div>


<div class="card">

⭐ Recorde:

<span id="record">0</span>

</div>


</div>



<canvas

id="game"

width="400"

height="400">

</canvas>

<button id="restart" class="restart-mobile">
    🔄 Começar
</button>
<div class="controls">
    <button class="btn-control" id="up">⬆️</button>

    <div class="row">
        <button class="btn-control" id="left">⬅️</button>
        <button class="btn-control" id="down">⬇️</button>
        <button class="btn-control" id="right">➡️</button>
    </div>
</div>



<div id="message">

Pressione ESPAÇO para iniciar

</div>



<button

id="restart"

style="display:none">

Jogar novamente

</button>



<script>
// ===============================
// ELEMENTOS
// ===============================

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");


const scoreElement = document.getElementById("score");

const recordElement = document.getElementById("record");

const message = document.getElementById("message");

const restartButton = document.getElementById("restart");



// ===============================
// CONFIGURAÇÕES
// ===============================


const tamanho = 20;

const colunas = canvas.width / tamanho;

const linhas = canvas.height / tamanho;



// ===============================
// VARIÁVEIS
// ===============================


let cobra = [];

let comida = {};

let direcao;

let proximaDirecao;


let pontos = 0;


let recorde = 
localStorage.getItem("snakeRecord") || 0;


let velocidade = 120;


let loopJogo;


let jogoRodando = false;


let pausado = false;



recordElement.innerHTML = recorde;




// ===============================
// INICIAR JOGO
// ===============================


function iniciarJogo(){


    cobra = [


        {
            x:10,
            y:10
        },


        {
            x:9,
            y:10
        },


        {
            x:8,
            y:10
        }


    ];



    direcao = "direita";

    proximaDirecao = "direita";


    pontos = 0;

    velocidade = 120;


    scoreElement.innerHTML = pontos;



    gerarComida();



    jogoRodando = true;

    pausado = false;



    restartButton.style.display="none";


    message.innerHTML =
    "Use as setas para jogar";



    clearInterval(loopJogo);



    loopJogo = setInterval(

        atualizarJogo,

        velocidade

    );


}





// ===============================
// ATUALIZAR JOGO
// ===============================


function atualizarJogo(){


    if(pausado)
    return;



    direcao = proximaDirecao;



    let cabeca = {

        x:cobra[0].x,

        y:cobra[0].y

    };



    if(direcao==="cima")
        cabeca.y--;


    if(direcao==="baixo")
        cabeca.y++;


    if(direcao==="esquerda")
        cabeca.x--;


    if(direcao==="direita")
        cabeca.x++;




    cobra.unshift(cabeca);



    if(

        cabeca.x === comida.x &&

        cabeca.y === comida.y

    ){


        pontos++;


        scoreElement.innerHTML = pontos;


        gerarComida();


        aumentarVelocidade();


    }

    else{


        cobra.pop();


    }



    verificarColisao();



    if(jogoRodando){

        desenhar();

    }


}







// ===============================
// DESENHAR
// ===============================


function desenhar(){


    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    desenharComida();


    desenharCobra();


}






// ===============================
// DESENHAR COBRA
// ===============================


function desenharCobra(){


    cobra.forEach((parte,index)=>{


        ctx.fillStyle =

        index === 0

        ?

        "#00ff88"

        :

        "#009955";



        ctx.beginPath();



        ctx.roundRect(

            parte.x * tamanho,

            parte.y * tamanho,

            tamanho-3,

            tamanho-3,

            6

        );



        ctx.fill();





        // olho da cobra

        if(index===0){


            ctx.fillStyle="#111";


            ctx.beginPath();


            ctx.arc(

                parte.x*tamanho+7,

                parte.y*tamanho+7,

                2,

                0,

                Math.PI*2

            );


            ctx.fill();


        }



    });



}






// ===============================
// DESENHAR COMIDA
// ===============================


function desenharComida(){



    let pulso =

    Math.sin(Date.now()/150)*2;



    ctx.beginPath();



    ctx.fillStyle="#ff0055";


    ctx.shadowBlur=20;

    ctx.shadowColor="#ff0055";



    ctx.arc(

        comida.x*tamanho+tamanho/2,

        comida.y*tamanho+tamanho/2,

        tamanho/2+pulso,

        0,

        Math.PI*2

    );



    ctx.fill();



    ctx.shadowBlur=0;



}
// ===============================
// GERAR COMIDA
// ===============================


function gerarComida(){


    let novaComida;


    do{


        novaComida = {

            x: Math.floor(
                Math.random()*colunas
            ),


            y: Math.floor(
                Math.random()*linhas
            )

        };


    }

    while(

        cobra.some(

            parte =>

            parte.x === novaComida.x &&

            parte.y === novaComida.y

        )

    );



    comida = novaComida;


}







// ===============================
// VERIFICAR COLISÃO
// ===============================


function verificarColisao(){


    let cabeca = cobra[0];



    // bateu na parede

    if(

        cabeca.x < 0 ||

        cabeca.y < 0 ||

        cabeca.x >= colunas ||

        cabeca.y >= linhas

    ){

        finalizarJogo();

        return;

    }





    // bateu no próprio corpo


    for(

        let i = 1;

        i < cobra.length;

        i++

    ){


        if(

            cabeca.x === cobra[i].x &&

            cabeca.y === cobra[i].y

        ){

            finalizarJogo();

            return;

        }


    }


}








// ===============================
// FINALIZAR JOGO
// ===============================


function finalizarJogo(){


    jogoRodando = false;


    clearInterval(loopJogo);



    message.innerHTML =

    "💀 Game Over! Pontuação: " + pontos;



    restartButton.style.display="block";



    salvarRecorde();


}








// ===============================
// SALVAR RECORDE
// ===============================


function salvarRecorde(){


    if(pontos > recorde){


        recorde = pontos;



        localStorage.setItem(

            "snakeRecord",

            recorde

        );


    }



    recordElement.innerHTML = recorde;


}








// ===============================
// AUMENTAR VELOCIDADE
// ===============================


function aumentarVelocidade(){


    if(

        pontos % 5 === 0

    ){


        if(

            velocidade > 50

        ){


            velocidade -= 10;



            clearInterval(loopJogo);



            loopJogo = setInterval(

                atualizarJogo,

                velocidade

            );


        }


    }


}








// ===============================
// CONTROLES
// ===============================


document.addEventListener(

"keydown",

function(event){



    if(

        event.key==="ArrowUp" &&

        direcao!=="baixo"

    ){

        proximaDirecao="cima";

    }





    if(

        event.key==="ArrowDown" &&

        direcao!=="cima"

    ){

        proximaDirecao="baixo";

    }





    if(

        event.key==="ArrowLeft" &&

        direcao!=="direita"

    ){

        proximaDirecao="esquerda";

    }





    if(

        event.key==="ArrowRight" &&

        direcao!=="esquerda"

    ){

        proximaDirecao="direita";

    }







    // iniciar espaço


    if(

        event.code==="Space" &&

        !jogoRodando

    ){

        iniciarJogo();

    }






    // pausa com P


    if(

        event.key.toLowerCase()==="p" &&

        jogoRodando

    ){


        pausado = !pausado;



        message.innerHTML = pausado

        ?

        "⏸ Jogo pausado"

        :

        "Use as setas para jogar";


    }






    // reiniciar com ENTER


    if(

        event.key==="Enter" &&

        !jogoRodando

    ){


        iniciarJogo();


    }



});









// ===============================
// BOTÃO REINICIAR
// ===============================


restartButton.onclick = function(){


    iniciarJogo();


};

function mudarDirecao(dir){

    if(dir==="cima" && direcao!=="baixo")
        proximaDirecao="cima";

    if(dir==="baixo" && direcao!=="cima")
        proximaDirecao="baixo";

    if(dir==="esquerda" && direcao!=="direita")
        proximaDirecao="esquerda";

    if(dir==="direita" && direcao!=="esquerda")
        proximaDirecao="direita";

}

document.getElementById("up")
.addEventListener("touchstart",e=>{
    e.preventDefault();
    mudarDirecao("cima");
});

document.getElementById("down")
.addEventListener("touchstart",e=>{
    e.preventDefault();
    mudarDirecao("baixo");
});

document.getElementById("left")
.addEventListener("touchstart",e=>{
    e.preventDefault();
    mudarDirecao("esquerda");
});

document.getElementById("right")
.addEventListener("touchstart",e=>{
    e.preventDefault();
    mudarDirecao("direita");
});




</script>


</body>

</html>
